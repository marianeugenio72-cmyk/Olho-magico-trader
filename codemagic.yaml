workflows:
  android-apk:
    name: Gerar APK Android

    environment:
      flutter: stable

    scripts:
      - name: Criar app Flutter limpo
        script: |
          rm -rf app_build

          flutter create app_build

          cd app_build

          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';

          void main() {
            runApp(const OlhoMagicoApp());
          }

          class OlhoMagicoApp extends StatelessWidget {
            const OlhoMagicoApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'Olho Mágico Trader',
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(
                    seedColor: Colors.deepPurple,
                  ),
                ),
                home: const HomePage(),
              );
            }
          }

          class HomePage extends StatelessWidget {
            const HomePage({super.key});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('Olho Mágico Trader'),
                ),
                body: Center(
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: const [
                      Icon(
                        Icons.visibility,
                        size: 100,
                        color: Colors.deepPurple,
                      ),
                      SizedBox(height: 20),
                      Text(
                        'APP FUNCIONANDO',
                        style: TextStyle(
                          fontSize: 28,
                          fontWeight: FontWeight.bold,
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }
          EOF

          flutter pub get

          flutter build apk --release

    artifacts:
      - app_build/build/app/outputs/flutter-apk/app-release.apk
